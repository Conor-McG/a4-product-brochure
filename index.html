<style>
  body {
    margin: 0;
    background: transparent;
    font-family: sans-serif;
  }

  .carousel {
    position: relative;
    width: 100%;
    max-width: 760px;
    aspect-ratio: 8.5 / 11;
    margin: auto;
    overflow: hidden;
    border-radius: 16px;
    background: white;
  }

  .slides {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }

  .slides img {
    width: 100%;
    height: 100%;
    flex-shrink: 0;
    object-fit: contain;
    background: white;
  }

  button {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: rgba(0,0,0,0.45);
    color: white;
    font-size: 28px;
    padding: 10px 14px;
    cursor: pointer;
    border-radius: 999px;
  }

  .prev { left: 12px; }
  .next { right: 12px; }

  .dots {
    text-align: center;
    margin-top: 10px;
  }

  .dot {
    height: 9px;
    width: 9px;
    margin: 0 4px;
    background: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
  }

  .dot.active {
    background: #333;
  }
</style>
